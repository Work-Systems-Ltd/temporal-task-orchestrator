services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - temporal-network

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - temporal-network

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    ports:
      - "8080:8080"
    networks:
      - temporal-network

  worker:
    build: .
    command: watchfiles --filter python "python worker.py" /app
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - .:/app
    networks:
      - temporal-network

  human-task-ui:
    build: .
    command: uvicorn ui.app:app --host 0.0.0.0 --port 8090 --reload
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - .:/app
    ports:
      - "8090:8090"
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge

volumes:
  postgresql_data:
