<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <title>{% block title %}Task Console{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="/static/js/theme.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body class="flex h-full flex-col bg-bg font-sans antialiased" :class="$store.theme.dark ? 'text-white' : 'text-zinc-900'" x-data>

  <div id="page-loader" class="page-loader">
    <div class="page-loader-logo">
      <img src="/static/img/logo.png" alt="Worksystems" class="logo-img h-5 opacity-60" />
    </div>
    <div class="page-loader-bar">
      <div class="page-loader-bar-fill"></div>
    </div>
  </div>
  <script defer src="/static/js/loader.js"></script>

  <header class="header-glass shrink-0" style="view-transition-name: header-bar">
    <div class="mx-auto flex h-16 max-w-[1080px] items-center gap-5 px-6">
      <a href="/" class="group flex shrink-0 items-center gap-2.5">
        <img src="/static/img/logo.png" alt="Worksystems" class="logo-img h-[22px] opacity-75 transition-all duration-200 group-hover:opacity-100" />
        <span class="header-brand-text">Console</span>
      </a>
      <div class="header-divider"></div>
      <nav class="flex items-center gap-1.5">
        <a href="/" class="nav-link {% if request.url.path == '/' %}nav-link--active{% endif %}">
          <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
          </svg>
          Tasks
        </a>
        <a href="/start" class="nav-link {% if request.url.path.startswith('/start') %}nav-link--active{% endif %}">
          <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          New
        </a>
      </nav>
      <div class="ml-auto flex items-center gap-3">
        <div class="hidden items-center gap-2.5 sm:flex">
          <div class="kbd-group">
            <kbd>N</kbd>
            <span>new</span>
          </div>
          <div class="kbd-group">
            <kbd>R</kbd>
            <span>refresh</span>
          </div>
        </div>
        <div class="header-divider"></div>
        <button @click="$store.theme.toggle()" class="theme-toggle" :title="$store.theme.dark ? 'Switch to light mode' : 'Switch to dark mode'" x-data>
          <svg x-show="$store.theme.dark" x-cloak class="h-[18px] w-[18px]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
          <svg x-show="!$store.theme.dark" x-cloak class="h-[18px] w-[18px]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  {% if request.query_params.get("completed") %}
  <div x-data="{ show: false }" x-show="show" x-init="$nextTick(() => show = true); setTimeout(() => show = false, 4000)"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-3"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-2"
       class="toast">
    <div class="toast-inner">
      <span class="toast-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
        </svg>
      </span>
      Task completed
      <button @click="show = false" class="toast-dismiss" aria-label="Dismiss">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
      </button>
    </div>
  </div>
  {% endif %}

  {% if request.query_params.get("started") %}
  <div x-data="{ show: false }" x-show="show" x-init="$nextTick(() => show = true); setTimeout(() => show = false, 4000)"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-3"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-2"
       class="toast">
    <div class="toast-inner">
      <span class="toast-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M2 10a8 8 0 1 1 16 0 8 8 0 0 1-16 0Zm11-1V7.5a.75.75 0 0 0-1.5 0V9H9a.75.75 0 0 0 0 1.5h2.5V13a.75.75 0 0 0 1.5 0v-2.5H15a.75.75 0 0 0 0-1.5h-2Z" clip-rule="evenodd" />
        </svg>
      </span>
      Workflow started
      <button @click="show = false" class="toast-dismiss" aria-label="Dismiss">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
      </button>
    </div>
  </div>
  {% endif %}

  <div id="nav-progress" class="nav-progress">
    <div class="nav-progress-bar"></div>
  </div>

  <main class="flex-1" style="view-transition-name: page-content">
    <div class="mx-auto max-w-[1080px] px-6 py-6">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="footer-modern shrink-0">
    <div class="mx-auto flex h-12 max-w-[1080px] items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <span class="footer-brand">Worksystems</span>
        <span class="footer-sep"></span>
        <span class="footer-label">Task Console</span>
      </div>
      <div class="flex items-center gap-2.5">
        <a href="/docs" class="footer-link" title="API Documentation">
          <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
          </svg>
        </a>
        <span class="footer-sep"></span>
        <span class="footer-label">Temporal v1.25</span>
        <span class="footer-sep"></span>
        <span class="footer-build" title="Build version">2026.04</span>
      </div>
    </div>
  </footer>

  {% block scripts %}{% endblock %}

</body>
</html>
