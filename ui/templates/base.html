<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Task Console{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body class="h-full bg-bg font-sans text-white antialiased">

  <header class="border-b border-border bg-bg">
    <div class="mx-auto flex h-14 max-w-[1080px] items-center gap-5 px-6">
      <a href="/" class="shrink-0">
        <img src="/static/img/logo.png" alt="Worksystems" class="h-5" />
      </a>
      <div class="h-4 w-px bg-border"></div>
      <nav class="flex items-center gap-1">
        <a href="/" class="rounded-md px-3 py-1.5 text-[13px] font-medium text-zinc-400 transition-colors hover:bg-white/[0.04] hover:text-white">Tasks</a>
        <a href="/start" class="rounded-md px-3 py-1.5 text-[13px] font-medium text-zinc-400 transition-colors hover:bg-white/[0.04] hover:text-white">New</a>
      </nav>
      <div class="ml-auto flex items-center gap-2">
        <span class="flex items-center gap-1.5 text-[12px] text-zinc-500">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
          Temporal connected
        </span>
      </div>
    </div>
  </header>

  {% if request.query_params.get("completed") %}
  <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 3500)"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="border-b border-emerald-500/10 bg-emerald-500/[0.06]">
    <div class="mx-auto flex max-w-[1080px] items-center gap-2 px-6 py-2.5 text-[13px] text-emerald-400">
      <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
      </svg>
      Task completed
    </div>
  </div>
  {% endif %}

  {% if request.query_params.get("started") %}
  <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 3500)"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="border-b border-blue-500/10 bg-blue-500/[0.06]">
    <div class="mx-auto flex max-w-[1080px] items-center gap-2 px-6 py-2.5 text-[13px] text-blue-400">
      <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
      </svg>
      Workflow started
    </div>
  </div>
  {% endif %}

  <main class="mx-auto max-w-[1080px] px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}

</body>
</html>
