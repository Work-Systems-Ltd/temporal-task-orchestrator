<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Task Console</title>
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="/static/js/theme.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body class="flex h-full flex-col bg-bg font-sans antialiased" :class="$store.theme.dark ? 'text-white' : 'text-zinc-900'" x-data>

  <!-- Subtle grid background -->
  <div class="login-bg-pattern"></div>

  <!-- Theme toggle — top right corner -->
  <div class="fixed right-5 top-5 z-10">
    <button @click="$store.theme.toggle()" class="theme-toggle" :title="$store.theme.dark ? 'Switch to light mode' : 'Switch to dark mode'">
      <svg x-show="$store.theme.dark" x-cloak class="h-[18px] w-[18px]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
      </svg>
      <svg x-show="!$store.theme.dark" x-cloak class="h-[18px] w-[18px]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
      </svg>
    </button>
  </div>

  <div class="relative flex flex-1 items-center justify-center px-4">
    <div class="login-card stagger-in" x-data="{ submitting: false }">

      <!-- Logo + heading -->
      <div class="mb-8 text-center">
        <img src="/static/img/logo.png" alt="Worksystems" class="logo-img mx-auto mb-3 h-5 opacity-70" />
        <h1 class="text-lg font-semibold" style="color: var(--color-text-primary);">Sign in to Task Console</h1>
        <p class="mt-1.5 text-sm" style="color: var(--color-text-muted);">Enter your credentials to continue</p>
      </div>

      <!-- Error banner -->
      {% if error %}
      <div class="login-error mb-5">
        <svg class="h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="post" action="/login" class="space-y-4" @submit="submitting = true">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}" />
        <input type="hidden" name="next_url" value="{{ next_url }}" />

        <div>
          <label for="username" class="login-label">Username</label>
          <div class="relative">
            <div class="login-input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="h-4 w-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
            </div>
            <input
              type="text" id="username" name="username" required autofocus
              class="login-input pl-10"
              placeholder="Enter username"
              autocomplete="username"
            />
          </div>
        </div>

        <div>
          <label for="password" class="login-label">Password</label>
          <div class="relative">
            <div class="login-input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="h-4 w-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" />
              </svg>
            </div>
            <input
              type="password" id="password" name="password" required
              class="login-input pl-10"
              placeholder="Enter password"
              autocomplete="current-password"
            />
          </div>
        </div>

        <div class="pt-1">
          <button type="submit" :disabled="submitting" class="btn btn-primary btn-lg w-full">
            <span :class="submitting ? 'invisible' : ''">Sign In</span>
            <span x-show="submitting" x-cloak class="absolute inset-0 flex items-center justify-center">
              <svg class="h-4 w-4 animate-spin spinner-on-inverted" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </span>
          </button>
        </div>
      </form>

      <!-- Footer -->
      <div class="mt-8 flex items-center justify-center gap-2">
        <span class="footer-brand">Worksystems</span>
        <span class="footer-sep"></span>
        <span class="footer-label">Task Console</span>
      </div>
    </div>
  </div>

</body>
</html>
