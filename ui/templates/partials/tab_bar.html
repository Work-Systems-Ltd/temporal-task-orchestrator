{% for t in tabs %}
<a href="/?tab={{ t }}{% if wf_type %}&type={{ wf_type }}{% endif %}"
   @click="navigateTab($event)"
   class="tab-item {% if tab == t %}tab-item-active{% endif %}">
  {{ t | capitalize }}
  {% if counts.get(t, 0) > 0 %}
  <span class="count-badge {% if tab == t %}count-badge-active{% else %}count-badge-muted{% endif %}">{{ counts[t] }}</span>
  {% endif %}
</a>
{% endfor %}
