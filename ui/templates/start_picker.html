{% extends "base.html" %}
{% block title %}New Workflow — Task Console{% endblock %}

{% block content %}
<script>
  window.__workflows = {{ workflows | tojson }};
</script>

<div class="mx-auto max-w-[560px] animate-fade-in"
     x-data="wizardData()" x-init="init()">

  <a href="/" class="back-link">
    <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
    Back to tasks
  </a>

  <div class="mb-6">
    <div class="flex items-center justify-center gap-3">
      <template x-for="s in [1, 2, 3]" :key="s">
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2">
            <div class="step-dot"
                 :class="step >= s ? 'step-dot-active' : 'step-dot-inactive'"
                 x-text="s"></div>
            <span class="text-[12px] font-medium transition-colors"
                  :class="step >= s ? 'text-zinc-300' : 'text-zinc-700'"
                  x-text="s === 1 ? 'Select' : s === 2 ? 'Configure' : 'Confirm'"></span>
          </div>
          <div x-show="s < 3" class="step-line" :class="step > s ? 'step-line-active' : 'step-line-inactive'"></div>
        </div>
      </template>
    </div>
  </div>

  <div class="card">

    <template x-if="step === 1">
      <div>
        <div class="card-header">
          <h1 class="text-[15px] font-semibold text-white">Choose a workflow</h1>
          <p class="mt-1 text-[13px] text-zinc-500">Select the type of workflow to start</p>
        </div>
        <div class="p-4">
          <div class="search-box mb-3">
            <input type="text" x-model="filterText" placeholder="Filter workflows..."
                   class="search-box-input" />
            <svg class="search-box-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
          </div>
          <div class="space-y-1.5">
            <template x-for="wf in filteredWorkflows" :key="wf.key">
              <button @click="selectWorkflow(wf)" type="button"
                      class="group picker-item">
                <div>
                  <div class="text-[13px] font-medium text-zinc-300 group-hover:text-white" x-text="wf.label"></div>
                  <div class="mt-0.5 text-[12px] text-zinc-600" x-text="wf.description"></div>
                </div>
                <svg class="h-4 w-4 shrink-0 text-zinc-700 transition-colors group-hover:text-zinc-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                </svg>
              </button>
            </template>
            <div x-show="filteredWorkflows.length === 0" class="py-6 text-center text-[13px] text-zinc-600">No matching workflows</div>
          </div>
        </div>
      </div>
    </template>

    <template x-if="step === 2">
      <div>
        <div class="card-header">
          <h1 class="text-[15px] font-semibold text-white" x-text="selectedLabel"></h1>
          <p class="mt-1 text-[13px] text-zinc-500" x-text="selectedDesc"></p>
        </div>
        <div class="p-5">
          <div class="space-y-1.5">
            <label class="block text-[13px] font-medium text-zinc-400" x-text="inputLabel"></label>
            <textarea x-ref="inputField" x-model="inputValue" rows="3"
                      :placeholder="inputPlaceholder"
                      class="input-field"></textarea>
          </div>
          <div class="mt-4 flex items-center justify-between border-t border-border pt-4">
            <button @click="step = 1" type="button" class="btn btn-ghost">Back</button>
            <button @click="inputValue.trim() && (step = 3)" type="button"
                    :disabled="!inputValue.trim()"
                    class="btn btn-primary">
              Continue
            </button>
          </div>
        </div>
      </div>
    </template>

    <template x-if="step === 3">
      <div>
        <div class="card-header">
          <h1 class="text-[15px] font-semibold text-white">Confirm and start</h1>
          <p class="mt-1 text-[13px] text-zinc-500">Review the details below before starting</p>
        </div>
        <div class="p-5">
          <dl class="space-y-3">
            <div>
              <dt class="text-[11px] font-medium uppercase tracking-wider text-zinc-600">Workflow</dt>
              <dd class="mt-0.5 text-[13px] text-zinc-300" x-text="selectedLabel"></dd>
            </div>
            <div>
              <dt class="text-[11px] font-medium uppercase tracking-wider text-zinc-600" x-text="inputLabel"></dt>
              <dd class="mt-0.5 text-[13px] text-zinc-300" x-text="inputValue"></dd>
            </div>
          </dl>
          <form :action="'/start/' + selectedKey" method="post" @submit="submitting = true" class="mt-4 border-t border-border pt-4">
            <input type="hidden" name="input_value" :value="inputValue" />
            <div class="flex items-center justify-between">
              <button @click.prevent="step = 2" type="button" class="btn btn-ghost">Back</button>
              <button type="submit" :disabled="submitting"
                      class="btn btn-primary relative">
                <span :class="submitting ? 'invisible' : ''">Start workflow</span>
                <span x-show="submitting" x-cloak class="absolute inset-0 flex items-center justify-center">
                  <svg class="h-3.5 w-3.5 animate-spin text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                  </svg>
                </span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </template>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function wizardData() {
  return {
    step: 1,
    selectedKey: '',
    selectedLabel: '',
    selectedDesc: '',
    inputLabel: '',
    inputPlaceholder: '',
    inputValue: '',
    submitting: false,
    workflows: [],
    filterText: '',
    get filteredWorkflows() {
      if (!this.filterText) return this.workflows;
      var q = this.filterText.toLowerCase();
      return this.workflows.filter(function(w) {
        return w.label.toLowerCase().indexOf(q) !== -1 || w.description.toLowerCase().indexOf(q) !== -1;
      });
    },
    init() {
      this.workflows = window.__workflows || [];
    },
    selectWorkflow(wf) {
      this.selectedKey = wf.key;
      this.selectedLabel = wf.label;
      this.selectedDesc = wf.description;
      this.inputLabel = wf.input_label;
      this.inputPlaceholder = wf.input_placeholder;
      this.step = 2;
      var self = this;
      this.$nextTick(function() { if (self.$refs.inputField) self.$refs.inputField.focus(); });
    }
  };
}
</script>
{% endblock %}
