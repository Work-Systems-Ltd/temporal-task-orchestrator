{% extends "base.html" %}
{% block title %}{{ wf.label }} — Task Console{% endblock %}

{% block content %}
<div x-data="{ submitting: false }" class="mx-auto max-w-[520px] animate-fade-in">

  <a href="/start" class="mb-5 inline-flex items-center gap-1 text-[12px] text-zinc-600 transition-colors hover:text-zinc-400">
    <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
    Back to workflows
  </a>

  <div class="overflow-hidden rounded-lg border border-border">

    <div class="border-b border-border bg-bg-raised px-5 py-4">
      <h1 class="text-[15px] font-semibold text-white">{{ wf.label }}</h1>
      <p class="mt-1 text-[13px] text-zinc-500">{{ wf.description }}</p>
    </div>

    <form method="post" action="/start/{{ wf.key }}" @submit="submitting = true" class="space-y-4 p-5">
      <div class="space-y-1.5">
        <label for="input_value" class="block text-[13px] font-medium text-zinc-400">{{ wf.input_label }}</label>
        <textarea id="input_value" name="input_value" rows="3"
                  placeholder="{{ wf.input_placeholder }}"
                  class="w-full rounded-md border bg-bg px-3 py-2 text-[13px] text-white placeholder-zinc-700 outline-none transition-colors
                         {{ 'border-red-500/50' if errors.get('input_value') else 'border-border hover:border-border-hover focus:border-zinc-500' }}"></textarea>
        {% for err in errors.get("input_value", []) %}
        <p class="text-[12px] text-red-400">{{ err }}</p>
        {% endfor %}
      </div>

      <div class="flex items-center justify-end gap-2 border-t border-border pt-4">
        <a href="/start" class="btn btn-ghost">Cancel</a>
        <button type="submit" :disabled="submitting"
                class="btn btn-primary relative">
          <span :class="submitting ? 'invisible' : ''">Start workflow</span>
          <span x-show="submitting" x-cloak class="absolute inset-0 flex items-center justify-center">
            <svg class="h-3.5 w-3.5 animate-spin text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </span>
        </button>
      </div>
    </form>

  </div>
</div>

{% block scripts %}
<script src="/static/js/task-list.js"></script>
{% endblock %}
{% endblock %}
